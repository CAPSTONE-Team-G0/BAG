{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>Dashboard</h2>
  <p class="muted">You’re logged in, but you haven’t selected a semester yet.</p>
  <div class="row">
    <a class="btn" href="{{ url_for('semesters.semester_new') }}">Create a Semester</a>
    <a class="btn secondary" href="{{ url_for('semesters.semesters') }}">Select a Semester</a>
  </div>

  {% if not profile %}
    <hr class="sep">
    <p class="muted">Create a <a href="{{ url_for('profile.profile') }}">Profile</a>!</p>
  {% endif %}
</div>
{% endblock %}
