{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>Budgeting</h2>
  <p class="hint">Set a budget amount for each category.</p>

  <form method="post" class="form grid">
    <div>
      <label>Category</label>
      <select name="category_id" required>
        <option value="">Select a category</option>
        {% for c in categories %}
          <option value="{{ c.id }}">{{ c.name }}</option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label>Budget Amount ($)</label>
      <input type="number" step="0.01" min="0" name="budget_amount" required>
    </div>

    <div class="full">
      <button class="btn secondary" type="submit">Save Budget</button>
    </div>
  </form>

  <div class="chips">
    {% for c in categories %}
      <span class="chip">
        {{ c.name }} —
        ${{ "%.2f"|format((c.budget_cents or 0) / 100) }}
      </span>
    {% endfor %}
  </div>
</div>
{% endblock %}
