{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>Edit Transaction</h2>

  <form method="post" class="form grid">
    <div>
      <label>Type</label>
      <select name="type">
        <option value="expense" {% if transaction.type == 'expense' %}selected{% endif %}>Expense</option>
        <option value="income" {% if transaction.type == 'income' %}selected{% endif %}>Income</option>
      </select>
    </div>

    <div>
      <label>Date</label>
      <input type="date" name="date" value="{{ transaction.date }}" required>
    </div>

    <div>
      <label>Amount ($)</label>
      <input
        type="number"
        step="0.01"
        min="0.01"
        name="amount"
        value="{{ '%.2f'|format(transaction.amount_cents / 100) }}"
        required
      >
    </div>

    <div class="full">
      <label>Category</label>
      <select name="category_id">
        <option value="">(none)</option>
        {% for c in categories %}
          <option value="{{ c.id }}" {% if transaction.category_id == c.id %}selected{% endif %}>
            {{ c.name }}
          </option>
        {% endfor %}
      </select>
    </div>

    <div class="full">
      <label>Note</label>
      <input name="note" value="{{ transaction.note or '' }}">
    </div>

    <div class="full">
      <button class="btn" type="submit">Save Changes</button>
    </div>
  </form>

  <form method="post" action="{{ url_for('core.transaction_delete', transaction_id=transaction.id) }}">
    <button class="btn secondary" type="submit">Delete Transaction</button>
  </form>
</div>
{% endblock %}
